# Logstash Configuration
# Enable automatic config reloading for hot-swapping pipelines
config.reload.automatic: true
config.reload.interval: 2s

# Disable X-Pack management (we're managing pipelines via files)
xpack.management.enabled: false

# API settings
api.http.host: "0.0.0.0"
api.http.port: 9600

# Logging
#log.level: info
#path.logs: /var/log/logstash

# Multi-pipeline mode: Logstash will automatically read pipelines.yml
# when it exists in the settings directory and no path.config is set
